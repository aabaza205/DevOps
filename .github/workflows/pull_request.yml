name: Claude Backend PR Review - Bedrock Sonnet 4.6

# Run Claude only for pull requests targeting the pre-production branch.
# This workflow is intentionally review-only: Claude can inspect the PR and
# post comments, but it should not edit repository files or perform merges.

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - test_pull_request

jobs:
  claude-review:
    name: Claude review only
    runs-on: ubuntu-latest
    steps:
      - name: Export AWS credentials for Claude Bedrock
        shell: bash
        run: echo "hello"
